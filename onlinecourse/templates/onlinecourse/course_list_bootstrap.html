<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Available Courses</h1>
    <div class="row">
        {% for course in course_list %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                {% if course.image %}
                <img src="{{ course.image.url }}" class="card-img-top" alt="{{ course.name }}">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ course.name }}</h5>
                    <p class="card-text">{{ course.description }}</p>
                    <p class="text-muted">Enrolled: {{ course.total_enrollment }}</p>
                    <a href="{% url 'onlinecourse:detail' course.id %}" class="btn btn-primary">View Course</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p>No courses available.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
